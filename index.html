<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>Super Mario</title>
  </head>
  <body>

    <!-- ── Title / Level Select ─────────────────────────────────────────── -->
    <div id="title-screen" class="overlay">
      <div class="overlay-inner">
        <div class="stars">★ ★ ★ ★ ★</div>
        <h1 class="game-title">SUPER<br/>MARIO</h1>
        <p class="blink subtitle">— SELECT WORLD —</p>
        <div class="btn-list">
          <button class="pixel-btn" onclick="window.startGame(0)">WORLD 1-1</button>
          <button class="pixel-btn" onclick="window.startGame(1)">WORLD 1-2</button>
          <button class="pixel-btn" onclick="window.startGame(2)">WORLD 1-3</button>
        </div>
        <p class="hint">← → MOVE &nbsp;·&nbsp; SPACE JUMP &nbsp;·&nbsp; ↓ ENTER PIPE</p>
      </div>
    </div>

    <!-- ── Game Over ─────────────────────────────────────────────────────── -->
    <div id="game-over-screen" class="overlay" style="display:none">
      <div class="overlay-inner">
        <h1 class="game-title red-text">GAME<br/>OVER</h1>
        <p class="score-text">SCORE: <span id="final-score">0</span></p>
        <div class="btn-list">
          <button class="pixel-btn" onclick="window.retryGame()">► TRY AGAIN</button>
          <button class="pixel-btn alt-btn" onclick="window.goToTitle()">► LEVEL SELECT</button>
        </div>
      </div>
    </div>

    <!-- ── Warp Zone (in-game level select) ──────────────────────────────── -->
    <div id="warp-screen" class="overlay semi-overlay" style="display:none">
      <div class="overlay-inner">
        <div class="stars gold">★ WARP ZONE ★</div>
        <p class="subtitle">CHOOSE YOUR WORLD</p>
        <div class="btn-list">
          <button class="pixel-btn" onclick="window.startGame(0)">WORLD 1-1</button>
          <button class="pixel-btn" onclick="window.startGame(1)">WORLD 1-2</button>
          <button class="pixel-btn" onclick="window.startGame(2)">WORLD 1-3</button>
          <button class="pixel-btn green-btn" onclick="window.closeWarp()">► RESUME</button>
        </div>
      </div>
    </div>

    <!-- ── In-game HUD (warp button, all devices) ────────────────────────── -->
    <div id="game-hud" style="display:none">
      <button class="hud-warp-btn" onclick="window.openWarp()">⚡ WARP</button>
    </div>

    <!-- ── Mobile Controls ───────────────────────────────────────────────── -->
    <div id="mobile-controls">
      <div id="dpad">
        <button id="btn-left"  class="ctrl-btn">◄</button>
        <button id="btn-down"  class="ctrl-btn down-ctrl">▼</button>
        <button id="btn-right" class="ctrl-btn">►</button>
      </div>
      <div id="right-controls">
        <button id="btn-jump" class="ctrl-btn jump-ctrl">A</button>
      </div>
    </div>

    <script src="https://kaboomjs.com/lib/0.5.0/kaboom.js"></script>
    <script src="game.js"></script>
  </body>
</html>
